name: Deploy to Production

# Auto-deploys to Vercel production on every push to main.
# Vercel's native Git integration is unavailable for private org repos on the
# Hobby plan, so this workflow deploys via the Vercel CLI instead.
#
# We let Vercel build remotely (a plain `vercel deploy --prod`) rather than
# building in CI with `--prebuilt`. Remote builds run with the project's
# configured environment variables (e.g. NEXT_PUBLIC_SUPABASE_URL), which must
# be present at build time for Next to inline them into the Edge middleware.
#
# Required setup (one time):
#   - Add a repository secret VERCEL_TOKEN (create at
#     https://vercel.com/account/tokens, scoped to the project's team). The
#     org/project IDs below are not secret — they live in .vercel/project.json.

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_YsPmv6RyYeFKKlyPIOxJWFjt
  VERCEL_PROJECT_ID: prj_g7bL2N92PIVuEDvNz4jYk2sPTpo6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to production
        # Remote build on Vercel — env vars are applied automatically.
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
