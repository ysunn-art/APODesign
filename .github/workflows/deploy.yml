name: Deploy to Production

# Auto-deploys to Vercel production on every push to main.
# Vercel's native Git integration is unavailable for private org repos on the
# Hobby plan, so this workflow deploys via the Vercel CLI instead.
#
# Required setup (one time):
#   - Add a repository secret VERCEL_TOKEN (create at
#     https://vercel.com/account/tokens). The org/project IDs below are not
#     secret — they live in .vercel/project.json.

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_YsPmv6RyYeFKKlyPIOxJWFjt
  VERCEL_PROJECT_ID: prj_g7bL2N92PIVuEDvNz4jYk2sPTpo6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
